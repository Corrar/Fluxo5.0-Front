<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>Fluxo Royale ERP</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script>
  // Resolve de assets: em dev/produção o Vite serve /public na raiz.
  window.__asset = function (p) {
    if (!p) return p;
    if (/^(https?:|data:|blob:|\/)/.test(p)) return p;
    return '/' + p;
  };
  // Bloqueia zoom por gesto/dbltap (mesmo comportamento do protótipo).
  document.addEventListener('gesturestart', function (e) { e.preventDefault(); });
  document.addEventListener('dblclick', function (e) { e.preventDefault(); }, { passive: false });
</script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; touch-action: pan-x pan-y; -ms-touch-action: pan-x pan-y; -webkit-text-size-adjust: 100%; }
  #root { height: 100%; }
  .fr-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .fr-scroll::-webkit-scrollbar-thumb { background: rgba(128,128,128,.28); border-radius: 8px; }
  .fr-scroll::-webkit-scrollbar-track { background: transparent; }
  @keyframes fr-pop { from { opacity: 0; transform: translateY(-6px) scale(.98); } to { opacity: 1; transform: none; } }
  @keyframes fr-spin { to { transform: rotate(360deg); } }
  .fr-spin { animation: fr-spin .7s linear infinite; display: inline-block; }
  button:focus-visible { outline: 2px solid #10b981; outline-offset: 2px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
